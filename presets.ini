; basing DGX Spark options from https://github.com/ggml-org/llama.cpp/blob/master/benches/dgx-spark/dgx-spark.md
; see `glow -p src/tools/server/README.md` for configuration options
[*]
flash-attn = on     ; defualt is auto (not needed?, or is this for misconfigured gguf?)
n-gpu-layers = -1   ; defualt is auto, changed for DGX Spark 
mmap = false        ; default is true, changed for DGX Spark
fit = false         ; https://forums.developer.nvidia.com/t/help-on-llama-cpp-command-line-arguments-and-compilation-settings-performance-testing-included/357012/2
models-max = 2      ; the spark will crash with out of memory type behaviour
threads = 10
parallel = 2

